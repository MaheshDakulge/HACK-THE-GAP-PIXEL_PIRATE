name: nagardocs_frontend
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  confetti: ^0.8.0
  cunning_document_scanner: ^1.4.0
  dio: ^5.9.2
  file_picker: ^10.3.10
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  freezed_annotation: ^3.1.0
  go_router: ^17.1.0
  image_picker: ^1.2.1
  json_annotation: ^4.11.0
  jwt_decoder: ^2.0.1
  open_filex: ^4.7.0
  path_provider: ^2.1.5
  shimmer: ^3.0.0
  supabase_flutter: ^2.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/nagardocs_ai_logo.png"
